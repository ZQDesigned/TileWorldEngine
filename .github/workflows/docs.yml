name: Docs

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Restore DocFX tool
        run: dotnet tool restore

      - name: Build documentation source assemblies
        run: |
          dotnet build TileWorld.Engine/TileWorld.Engine.csproj -c Release
          dotnet build TileWorld.Engine.Hosting.MonoGame/TileWorld.Engine.Hosting.MonoGame.csproj -c Release

      - name: Build DocFX site
        run: dotnet tool run docfx docs/docfx.json

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_site

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
